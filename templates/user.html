{% extends 'base.html' %}

{% block content %}

<div class="page-header">
    <h2>Manajemen User</h2>
</div>

<div class="split-layout">

    <!-- ================= LEFT SIDE (FORM) ================= -->
    <div class="split-left">
        <div class="form-box premium-user-form">
            <form method="POST" class="form-grid">

                <div>
                    <label>Username</label>
                    <input type="text"
                           name="username"
                           placeholder="Input Username"
                           required>
                </div>

                <div>
                    <label>Password</label>
                    <input type="password"
                           name="password"
                           placeholder="Input Password"
                           required>
                </div>

                <div>
                    <label>Role</label>
                    <select name="role">
                        <option value="admin">Admin</option>
                        <option value="cabang">Cabang</option>
                    </select>
                </div>

                <div>
                    <label>Cabang</label>
                    <select name="cabang">
                        <option value="Pusat">Pusat</option>
                        <option value="Tuban">Tuban</option>
                        <option value="Mahendradatta">Mahendradatta</option>
                    </select>
                </div>

                <div class="full button-wrapper">
                    <button type="submit">Tambah User</button>
                </div>

            </form>
        </div>
    </div>

    <!-- ================= RIGHT SIDE (TABLE) ================= -->
    <div class="split-right">
        <div class="card">
            <div class="table-responsive">
                <table class="premium-table">
                    <thead>
                        <tr>
                            <th>Username</th>
                            <th>Role</th>
                            <th>Cabang</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for u in data %}
                        <tr>
                            <td data-label="Username">{{ u.username }}</td>
                            <td data-label="Role">{{ u.role }}</td>
                            <td data-label="Cabang">{{ u.cabang }}</td>
                            <td data-label="Aksi">

                                <a href="{{ url_for('edit_user', id=u.id) }}" class="btn-edit">
                                    ✏ Edit
                                </a>

                                <a href="#"
                                   class="btn-delete"
                                   data-id="{{ u.id }}"
                                   onclick="openDeleteModal(this)">
                                    🗑 Hapus
                                </a>

                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

{% endblock %}



{% block modal %}

<div id="deleteModal" class="custom-modal">
    <div class="modal-content">
        <h3>⚠ Konfirmasi Hapus</h3>
        <p>Yakin ingin menghapus user ini?</p>

        <div class="modal-actions">
            <button type="button" onclick="closeDeleteModal()" class="btn-cancel">
                Batal
            </button>

            <a id="confirmDeleteBtn" class="btn-delete">
                Ya, Hapus
            </a>
        </div>
    </div>
</div>

<script>
function openDeleteModal(element) {
    const userId = element.getAttribute("data-id");
    document.getElementById("confirmDeleteBtn").href = "/delete_user/" + userId;
    document.getElementById("deleteModal").style.display = "flex";
}

function closeDeleteModal() {
    document.getElementById("deleteModal").style.display = "none";
}

// Klik luar modal untuk close
window.onclick = function(event) {
    const modal = document.getElementById("deleteModal");
    if (event.target === modal) {
        modal.style.display = "none";
    }
}
</script>

{% endblock %}
